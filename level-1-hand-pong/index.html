<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Pong — Level 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    #container {
      position: relative;
      width: 640px;
      height: 480px;
    }
    #webcam {
      position: absolute;
      top: 0; left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
      opacity: 0.25;
      border-radius: 12px;
      display: none;
    }
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 640px;
      height: 480px;
      border-radius: 12px;
      background: #111;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 640px;
      height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      border-radius: 12px;
    }
    #overlay.hidden { display: none; }
    #overlay h1 { font-size: 48px; margin-bottom: 8px; }
    #overlay p { font-size: 18px; opacity: 0.7; margin-bottom: 4px; }
    #startBtn {
      margin-top: 20px;
      padding: 12px 32px;
      font-size: 18px;
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #startBtn:hover { background: #5a4bd1; }
    #startBtn:disabled { background: #444; cursor: wait; }
    #hud {
      position: absolute;
      top: 12px; left: 12px; right: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 20px;
      font-weight: 600;
      z-index: 5;
      pointer-events: none;
    }
    #trackingStatus {
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      opacity: 0.6;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div id="hud">
      <span id="scoreDisplay">Score: 0</span>
      <span id="livesDisplay">Lives: 3</span>
    </div>
    <div id="trackingStatus">Loading...</div>
    <div id="overlay">
      <h1>Hand Pong</h1>
      <p>Control the paddle with your hand</p>
      <p id="modeLabel" style="font-size:14px; opacity:0.5"></p>
      <button id="startBtn" disabled>Loading model...</button>
    </div>
  </div>

  <script type="module">
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const trackingStatus = document.getElementById('trackingStatus');
    const modeLabel = document.getElementById('modeLabel');

    const W = 640, H = 480;

    // State
    let state = 'menu';
    let score = 0;
    let lives = 3;
    let handX = W / 2;
    let handDetected = false;
    let useMouseFallback = false;
    let handLandmarker = null;
    let lastVideoTime = -1;

    // Paddle
    const paddle = { w: 120, h: 16, x: W / 2 - 60, y: H - 40 };

    // Ball
    const ball = { x: W / 2, y: H / 2, r: 10, vx: 4, vy: 4, speed: 4 };

    let particles = [];

    // Mouse fallback
    canvas.addEventListener('mousemove', (e) => {
      if (useMouseFallback) {
        const rect = canvas.getBoundingClientRect();
        handX = ((e.clientX - rect.left) / rect.width) * W;
        handDetected = true;
      }
    });

    function resetBall() {
      ball.x = W / 2;
      ball.y = H / 3;
      const angle = (Math.random() * Math.PI / 2) + Math.PI / 4;
      ball.vx = ball.speed * Math.cos(angle) * (Math.random() > 0.5 ? 1 : -1);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function spawnParticles(x, y, color, count = 8) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 1, color,
          r: Math.random() * 3 + 1,
        });
      }
    }

    // ---- Init ----
    async function init() {
      // Try to load MediaPipe + webcam
      try {
        startBtn.textContent = 'Loading hand model...';
        trackingStatus.textContent = 'Loading hand model...';

        const { HandLandmarker, FilesetResolver } = await import(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs'
        );

        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
        );

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
            delegate: 'GPU',
          },
          runningMode: 'VIDEO',
          numHands: 1,
        });

        trackingStatus.textContent = 'Starting webcam...';
        startBtn.textContent = 'Starting webcam...';

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: W, height: H, facingMode: 'user' }
        });
        video.srcObject = stream;
        await new Promise((resolve, reject) => {
          video.onloadedmetadata = resolve;
          video.onerror = reject;
        });
        await video.play();
        video.style.display = 'block';

        useMouseFallback = false;
        modeLabel.textContent = 'Using hand tracking';
        trackingStatus.textContent = 'Show your hand to control the paddle';
      } catch (err) {
        console.warn('Hand tracking not available, using mouse fallback:', err.message);
        useMouseFallback = true;
        handDetected = true;
        modeLabel.textContent = 'Mouse mode (webcam unavailable)';
        trackingStatus.textContent = 'Move your mouse to control the paddle';
      }

      startBtn.textContent = 'Start Game';
      startBtn.disabled = false;

      // Start the loop immediately so the menu draws
      loop();
    }

    // ---- Hand detection ----
    function detectHands() {
      if (!handLandmarker || useMouseFallback) return;
      if (video.readyState < 2) return;
      if (video.currentTime === lastVideoTime) return;

      lastVideoTime = video.currentTime;
      const results = handLandmarker.detectForVideo(video, performance.now());

      if (results.landmarks && results.landmarks.length > 0) {
        const lm = results.landmarks[0];
        handX = (1 - lm[9].x) * W;
        handDetected = true;
        trackingStatus.textContent = 'Hand tracked';
        trackingStatus.style.opacity = '0.3';
      } else {
        handDetected = false;
        if (state === 'playing') {
          trackingStatus.textContent = 'Hand lost! Show your hand';
          trackingStatus.style.opacity = '0.8';
        }
      }
    }

    // ---- Game ----
    startBtn.addEventListener('click', () => {
      state = 'playing';
      score = 0;
      lives = 3;
      ball.speed = 4;
      overlay.classList.add('hidden');
      resetBall();
    });

    function update() {
      if (state !== 'playing') return;

      paddle.x += (handX - paddle.w / 2 - paddle.x) * 0.3;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx *= -1; spawnParticles(ball.x, ball.y, '#00b894'); }
      if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.vx *= -1; spawnParticles(ball.x, ball.y, '#00b894'); }
      if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy *= -1; spawnParticles(ball.x, ball.y, '#00b894'); }

      if (
        ball.vy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + Math.abs(ball.vy) &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.w
      ) {
        ball.vy *= -1;
        ball.y = paddle.y - ball.r;
        const hitPos = (ball.x - paddle.x) / paddle.w;
        ball.vx = ball.speed * (hitPos - 0.5) * 2.5;
        score++;
        ball.speed = Math.min(10, 4 + score * 0.15);
        const mag = Math.sqrt(ball.vx ** 2 + ball.vy ** 2);
        ball.vx = (ball.vx / mag) * ball.speed;
        ball.vy = -(Math.abs(ball.vy) / mag) * ball.speed;
        spawnParticles(ball.x, paddle.y, '#6c5ce7', 12);
      }

      if (ball.y - ball.r > H) {
        lives--;
        if (lives <= 0) {
          state = 'gameover';
          overlay.classList.remove('hidden');
          overlay.querySelector('h1').textContent = 'Game Over';
          overlay.querySelector('p').textContent = `Final Score: ${score}`;
          startBtn.textContent = 'Play Again';
        } else {
          resetBall();
        }
      }

      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        return p.life > 0;
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Background grid
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

      if (state === 'menu') return;

      // Paddle
      const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y);
      grad.addColorStop(0, '#6c5ce7');
      grad.addColorStop(1, '#a29bfe');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 8);
      ctx.fill();
      ctx.shadowColor = '#6c5ce7';
      ctx.shadowBlur = 20;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Ball
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Trail
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.arc(ball.x - ball.vx, ball.y - ball.vy, ball.r * 0.8, 0, Math.PI * 2);
      ctx.fill();

      // Particles
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Hand dot
      if (handDetected && !useMouseFallback) {
        ctx.strokeStyle = 'rgba(108, 92, 231, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(handX, paddle.y + paddle.h / 2, 15, 0, Math.PI * 2);
        ctx.stroke();
      }

      scoreDisplay.textContent = `Score: ${score}`;
      livesDisplay.textContent = `Lives: ${lives}`;
    }

    function loop() {
      detectHands();
      update();
      draw();
      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
