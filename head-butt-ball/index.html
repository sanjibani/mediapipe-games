<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Head Butt Ball</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #e0e0e0;
      overflow: hidden;
    }
    #container {
      position: relative;
      width: 640px;
      height: 480px;
    }
    #webcam {
      position: absolute;
      top: 0; left: 0;
      width: 640px; height: 480px;
      transform: scaleX(-1);
      opacity: 0.2;
      border-radius: 8px;
      display: none;
    }
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 640px; height: 480px;
      border-radius: 8px;
      background: #111;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 640px; height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.75);
      z-index: 10;
      border-radius: 8px;
    }
    #overlay.hidden { display: none; }
    #overlay h1 { font-size: 36px; margin-bottom: 6px; font-weight: 300; letter-spacing: 2px; }
    #overlay p { font-size: 15px; opacity: 0.5; margin-bottom: 4px; }
    #startBtn {
      margin-top: 18px;
      padding: 10px 28px;
      font-size: 16px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 1px;
    }
    #startBtn:hover { background: #ddd; }
    #startBtn:disabled { background: #444; color: #888; cursor: wait; }
    #hud {
      position: absolute;
      top: 10px; left: 14px; right: 14px;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 400;
      z-index: 5;
      pointer-events: none;
      opacity: 0.7;
    }
    #trackingStatus {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      opacity: 0.4;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div id="hud">
      <span id="scoreDisplay">0</span>
      <span id="livesDisplay">&#9679; &#9679; &#9679;</span>
    </div>
    <div id="trackingStatus">loading...</div>
    <div id="overlay">
      <h1>HEAD BUTT BALL</h1>
      <p>move your head to butt the falling balls</p>
      <p id="modeLabel" style="font-size:12px; opacity:0.35"></p>
      <button id="startBtn" disabled>loading...</button>
    </div>
  </div>

  <script type="module">
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const trackingStatus = document.getElementById('trackingStatus');
    const modeLabel = document.getElementById('modeLabel');

    const W = 640, H = 480;

    // --- State ---
    let state = 'menu';
    let score = 0;
    let lives = 3;
    let headX = W / 2;
    let headY = H / 2;
    let headDetected = false;
    let useMouseFallback = false;
    let faceLandmarker = null;
    let lastVideoTime = -1;

    // Head hitbox radius — shrinks with difficulty
    let headRadius = 40;

    // Balls
    let balls = [];
    let spawnTimer = 0;
    let spawnInterval = 90; // frames between spawns
    let difficultyLevel = 0;

    // Particles
    let particles = [];

    // Mouse fallback
    canvas.addEventListener('mousemove', (e) => {
      if (useMouseFallback) {
        const rect = canvas.getBoundingClientRect();
        headX = ((e.clientX - rect.left) / rect.width) * W;
        headY = ((e.clientY - rect.top) / rect.height) * H;
        headDetected = true;
      }
    });

    // --- Init ---
    async function init() {
      try {
        startBtn.textContent = 'loading model...';
        trackingStatus.textContent = 'loading face model...';

        const { FaceLandmarker, FilesetResolver } = await import(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs'
        );

        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
        );

        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
            delegate: 'GPU',
          },
          runningMode: 'VIDEO',
          numFaces: 1,
          minFaceDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });

        trackingStatus.textContent = 'starting webcam...';
        startBtn.textContent = 'starting webcam...';

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: W, height: H, facingMode: 'user' }
        });
        video.srcObject = stream;
        await new Promise((resolve, reject) => {
          video.onloadedmetadata = resolve;
          video.onerror = reject;
        });
        await video.play();
        video.style.display = 'block';

        useMouseFallback = false;
        modeLabel.textContent = 'face tracking';
        trackingStatus.textContent = 'face tracking ready';
      } catch (err) {
        console.warn('Face tracking unavailable, mouse fallback:', err.message);
        useMouseFallback = true;
        headDetected = true;
        modeLabel.textContent = 'mouse mode (webcam unavailable)';
        trackingStatus.textContent = 'mouse mode';
      }

      startBtn.textContent = 'START';
      startBtn.disabled = false;
      loop();
    }

    // --- Face detection ---
    function detectFace() {
      if (!faceLandmarker || useMouseFallback) return;
      if (video.readyState < 2) return;
      if (video.currentTime === lastVideoTime) return;

      lastVideoTime = video.currentTime;
      const results = faceLandmarker.detectForVideo(video, performance.now());

      if (results.faceLandmarks && results.faceLandmarks.length > 0) {
        const lm = results.faceLandmarks[0];
        // Landmark 10 = forehead center (top of head area)
        // Landmark 152 = chin
        // Use the top of the forehead for "headbutt" position
        headX = (1 - lm[10].x) * W;
        headY = lm[10].y * H;
        headDetected = true;
        trackingStatus.textContent = 'tracking';
        trackingStatus.style.opacity = '0.3';
      } else {
        headDetected = false;
        if (state === 'playing') {
          trackingStatus.textContent = 'face lost!';
          trackingStatus.style.opacity = '0.7';
        }
      }
    }

    // --- Ball spawning ---
    function spawnBall() {
      const x = 30 + Math.random() * (W - 60);
      let vx = 0;
      let vy = 1.5 + difficultyLevel * 0.3;

      // After score 5, start adding angled balls
      if (score >= 5 && Math.random() > 0.5) {
        vx = (Math.random() - 0.5) * 2;
      }
      // After score 15, more aggressive angles
      if (score >= 15 && Math.random() > 0.4) {
        vx = (Math.random() - 0.5) * 3.5;
      }

      balls.push({
        x, y: -15,
        r: 12,
        vx, vy,
        alive: true,
      });
    }

    // --- Particles ---
    function burstParticles(x, y, count = 10) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        particles.push({
          x, y,
          vx: Math.cos(angle) * (2 + Math.random() * 3),
          vy: Math.sin(angle) * (2 + Math.random() * 3) - 2,
          life: 1,
          r: 1.5 + Math.random() * 2,
        });
      }
    }

    function missParticles(x, y) {
      for (let i = 0; i < 5; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 2,
          vy: -Math.random() * 2,
          life: 0.6,
          r: 1,
          miss: true,
        });
      }
    }

    // --- Game ---
    startBtn.addEventListener('click', () => {
      state = 'playing';
      score = 0;
      lives = 3;
      balls = [];
      particles = [];
      spawnTimer = 0;
      spawnInterval = 90;
      difficultyLevel = 0;
      headRadius = 40;
      overlay.classList.add('hidden');
    });

    function updateDifficulty() {
      difficultyLevel = Math.floor(score / 5);
      // Spawn faster: 90 → min 25 frames
      spawnInterval = Math.max(25, 90 - difficultyLevel * 8);
      // Head hitbox shrinks: 40 → min 22
      headRadius = Math.max(22, 40 - difficultyLevel * 2);
    }

    function update() {
      if (state !== 'playing') return;

      // Spawn balls
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnBall();
        // After score 10, occasionally spawn two at once
        if (score >= 10 && Math.random() > 0.6) {
          spawnBall();
        }
        // After score 25, sometimes three
        if (score >= 25 && Math.random() > 0.7) {
          spawnBall();
        }
        spawnTimer = 0;
      }

      // Update balls
      for (const b of balls) {
        if (!b.alive) continue;

        b.x += b.vx;
        b.y += b.vy;

        // Bounce off side walls
        if (b.x - b.r < 0) { b.x = b.r; b.vx *= -1; }
        if (b.x + b.r > W) { b.x = W - b.r; b.vx *= -1; }

        // Check headbutt collision
        if (headDetected) {
          const dx = b.x - headX;
          const dy = b.y - headY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < headRadius + b.r) {
            b.alive = false;
            score++;
            updateDifficulty();
            burstParticles(b.x, b.y);
          }
        }

        // Ball fell past bottom
        if (b.y - b.r > H) {
          b.alive = false;
          lives--;
          missParticles(b.x, H - 10);
          if (lives <= 0) {
            state = 'gameover';
            overlay.classList.remove('hidden');
            overlay.querySelector('h1').textContent = 'GAME OVER';
            overlay.querySelector('p').textContent = `score: ${score}`;
            startBtn.textContent = 'RETRY';
          }
        }
      }

      // Remove dead balls
      balls = balls.filter(b => b.alive);

      // Update particles
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08; // gravity on particles
        p.life -= 0.025;
        return p.life > 0;
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,0.02)';
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      if (state === 'menu') return;

      // Draw head hitbox
      if (headDetected) {
        // Outer ring
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
        ctx.stroke();

        // Crosshair
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(headX - headRadius * 0.5, headY);
        ctx.lineTo(headX + headRadius * 0.5, headY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(headX, headY - headRadius * 0.5);
        ctx.lineTo(headX, headY + headRadius * 0.5);
        ctx.stroke();

        // Center dot
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(headX, headY, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw balls
      for (const b of balls) {
        if (!b.alive) continue;

        // Ball body
        ctx.fillStyle = '#e0e0e0';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();

        // Inner circle detail
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 0.6, 0, Math.PI * 2);
        ctx.stroke();

        // Drop shadow
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.arc(b.x, b.y + 2, b.r + 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw particles
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.miss ? 'rgba(255,80,80,0.6)' : '#fff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // HUD
      scoreDisplay.textContent = score;
      let livesStr = '';
      for (let i = 0; i < 3; i++) livesStr += i < lives ? '\u25CF ' : '\u25CB ';
      livesDisplay.textContent = livesStr.trim();
    }

    function loop() {
      detectFace();
      update();
      draw();
      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
